# Rebuild the global map-data tile pyramid once a month.
#
# Downloads Natural Earth 10m + OurAirports snapshots at the moment
# the action runs, feeds them through scripts/build_tiles.py, and
# commits the refreshed tiles under web/public/data/tiles/ to the
# branch. The subsequent push triggers deploy-web.yml which uploads
# them to Netlify — no additional infra needed.
#
# web/public/data/tiles/ is in .gitignore so a contributor's local
# bake never sneaks into an unrelated commit; this workflow uses
# `git add -f` to override.
#
# Fetch cadence matches the plan: once a month is plenty for
# coastlines / airports and won't strain the source hosts.
name: Build tiles

on:
  schedule:
    # 1st of the month at 08:23 UTC. Off the :00 minute so all GH
    # scheduled tasks from every repo in the fleet aren't hammering
    # at once.
    - cron: "23 8 1 * *"
  workflow_dispatch:

concurrency:
  group: build-tiles-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bake tiles
        run: |
          python scripts/build_tiles.py
          echo "--- tile pyramid summary ---"
          find web/public/data/tiles -name '*.bin' | wc -l
          du -sh web/public/data/tiles

      - name: Smoke check pyramid shape
        # A silent bake would ship broken tiles for a whole month before
        # anyone notices. Explicit assertions on the shape of the output
        # make failures loud. Numbers tuned to the current 3/5/7 pyramid
        # (~8k tiles globally); a broken run typically produces <100.
        run: |
          set -e
          TILE_COUNT=$(find web/public/data/tiles -name '*.bin' | wc -l)
          echo "Tile count: $TILE_COUNT"
          if [ "$TILE_COUNT" -lt 3000 ]; then
            echo "::error::Bake produced only $TILE_COUNT tiles — expected ≥ 3000. Sources likely broken."
            exit 1
          fi
          for Z in 3 5 7; do
            if [ ! -d "web/public/data/tiles/$Z" ]; then
              echo "::error::Missing zoom directory: web/public/data/tiles/$Z"
              exit 1
            fi
          done
          # SF-area canary. If this specific tile is missing the whole
          # SF bootstrap is broken and the emulator's built-in tile
          # (data/emulator_bootstrap_tile_7_20_37.bin) can't be
          # regenerated from the pipeline output.
          if [ ! -f "web/public/data/tiles/7/20/37.bin" ]; then
            echo "::error::SF canary tile (7/20/37) missing — SF bootstrap broken."
            exit 1
          fi
          # Freshness sentinel: machine-readable UTC datetime a future
          # monitor can compare against `now - 45 days` to decide
          # whether the monthly cron has actually been firing.
          date -u +"%Y-%m-%dT%H:%M:%SZ" > web/public/data/tiles/BAKE_TIMESTAMP.txt

      - name: Commit refreshed tiles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f because .gitignore excludes web/public/data/tiles/ — the
          # workflow is the sanctioned way to update those files.
          git add -f web/public/data/tiles
          if git diff --cached --quiet; then
            echo "no tile changes — skipping commit"
            exit 0
          fi
          git commit -m "Tiles: monthly rebuild from Natural Earth + OurAirports

          Automated refresh triggered by the build-tiles workflow.
          Sources fetched at commit time:
            - Natural Earth 1:10m coastline / land / minor_islands / lakes
            - OurAirports airports.csv + runways.csv
              (any airport with a lighted, non-closed runway is
               force-included as IFR-capable — proxy for having a
               published instrument approach, since OurAirports
               doesn't publish ILS data directly)
          "
          git push
