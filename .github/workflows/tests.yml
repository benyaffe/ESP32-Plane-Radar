# Runs the three test suites on every push. All three must pass before
# the deploy-web workflow will run (see needs: below in that workflow).
#
# - Python (pytest):    build-script helpers + coastline-quality baseline
# - Web (vitest):       projection + weather category derivation
# - Firmware (Unity):   pure geometry + weather category (native binary,
#                       no ESP32 toolchain needed — fast)
name: Tests

on:
  push:
    branches: [main, sdl-emulator]
  pull_request:
    branches: [main, sdl-emulator]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest -v --cov=scripts --cov-report=term --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      # `npm install` (not `npm ci`) — npm ci errors on esbuild's
      # cross-platform optional deps in the lock (EBADPLATFORM for
      # @esbuild/aix-ppc64 when running on linux/x64). `npm install`
      # skips the wrong-platform ones and still uses the lock for the
      # rest, so results stay deterministic.
      - run: npm install --no-audit --no-fund
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: web/coverage/
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Run native Unity tests
        run: pio test -e native_test

  native-build-smoke:
    # Smoke check that the SDL emulator binary still compiles + links.
    # Catches regressions in main.cpp / host_main.cpp / host_stubs that
    # the unit-test env misses (native_test deliberately excludes SDL,
    # ArduinoJson, and HTTP so tests stay fast). Not a runtime test —
    # no SDL init happens on the CI runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build native (SDL emulator) binary
        run: pio run -e native
        env:
          HOMEBREW_PREFIX: /usr
