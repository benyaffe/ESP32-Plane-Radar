[build]
  # Netlify runs this from the base directory. In the Netlify site
  # settings the base is set to `web`, so paths below are relative to
  # `<repo>/web/`.
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# The function at netlify/functions/adsb.js already declares its own
# path via a `config.path` export, so no manual redirect is strictly
# required. Kept here as a fallback in case the export is ignored.
[[redirects]]
  from = "/api/adsb"
  to = "/.netlify/functions/adsb"
  status = 200
  force = true

# METAR proxy — aviationweather.gov doesn't send CORS headers so the
# browser can't call it direct. netlify/functions/metar.mjs does the
# fetch server-side and adds Access-Control-Allow-Origin.
[[redirects]]
  from = "/api/metar"
  to = "/.netlify/functions/metar"
  status = 200
  force = true

# Geocoding proxy — Nominatim (OpenStreetMap). Sets the required
# User-Agent server-side and lets the Netlify CDN cache per query.
[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/geocode"
  status = 200
  force = true
